<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 PawZoom 🐱</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --zoom-blue: #1a73e8;
    --zoom-dark: #0b5cbe;
    --zoom-light: #e8f0fe;
    --zoom-bg: #1c2b4a;
    --vibrant-pink: #ff4fc8;
    --vibrant-yellow: #ffe033;
    --vibrant-green: #00e5a0;
    --vibrant-orange: #ff7a30;
    --vibrant-purple: #b06aff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(135deg, #0d1b3e 0%, #1a2e5a 40%, #0e2248 100%);
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Animated background dots */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(26,115,232,0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    color: white;
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
    text-shadow: 0 0 40px rgba(26,115,232,0.8), 0 0 80px rgba(26,115,232,0.4);
  }

  h1 span { color: var(--vibrant-yellow); }

  .tagline {
    font-size: 1rem;
    color: rgba(255,255,255,0.55);
    text-align: center;
    margin-bottom: 28px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    position: relative;
    z-index: 1;
  }

  /* iPhone frame */
  .iphone {
    position: relative;
    z-index: 1;
    width: 320px;
    height: 620px;
    background: #1a1a2e;
    border-radius: 48px;
    border: 6px solid #3a3a5c;
    box-shadow:
      0 0 0 1px #1a1a3a,
      0 30px 80px rgba(0,0,0,0.7),
      0 0 60px rgba(26,115,232,0.25),
      inset 0 0 20px rgba(0,0,0,0.5);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* iPhone notch */
  .iphone::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 28px;
    background: #1a1a2e;
    border-radius: 0 0 18px 18px;
    z-index: 10;
    border: 3px solid #3a3a5c;
    border-top: none;
  }

  /* Zoom top bar */
  .zoom-bar {
    background: linear-gradient(90deg, #1a2e5a, #1e3a6e);
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(26,115,232,0.3);
    margin-top: 28px;
    flex-shrink: 0;
  }

  .zoom-logo {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .zoom-logo svg {
    width: 20px; height: 20px;
  }

  .zoom-logo-text {
    font-family: 'Bebas Neue', sans-serif;
    color: white;
    font-size: 1.1rem;
    letter-spacing: 1px;
  }

  .zoom-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.62rem;
    color: var(--vibrant-green);
    font-weight: 800;
  }

  .status-dot {
    width: 6px; height: 6px;
    background: var(--vibrant-green);
    border-radius: 50%;
    animation: pulse-dot 1.5s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  /* Zoom video area */
  .zoom-screen {
    background: linear-gradient(180deg, #1557c0 0%, #1a73e8 50%, #1d6be0 100%);
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Grid lines on zoom bg */
  .zoom-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 30px 30px;
    pointer-events: none;
  }

  /* Participant name tag */
  .name-tag {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(0,0,0,0.55);
    color: white;
    font-size: 0.65rem;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  /* Corner mini preview */
  .mini-preview {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 60px;
    height: 46px;
    background: rgba(0,0,0,0.5);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    overflow: hidden;
  }

  .mini-face {
    font-size: 1.8rem;
    animation: micro-bounce 2s infinite ease-in-out;
  }

  @keyframes micro-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  /* Main cat emoji */
  .cat-emoji {
    font-size: 7rem;
    line-height: 1;
    position: relative;
    z-index: 2;
    cursor: pointer;
    transition: transform 0.1s ease;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4));
    animation: float 3s ease-in-out infinite;
    will-change: transform;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-12px) scale(1.03); }
  }

  .cat-emoji:active { transform: scale(0.88); }

  .cat-emoji.pop {
    animation: pop 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
  }

  @keyframes pop {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.45) rotate(-8deg); }
    60%  { transform: scale(0.85) rotate(5deg); }
    80%  { transform: scale(1.15) rotate(-3deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* Click ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transform: scale(0);
    animation: ripple-anim 0.6s linear forwards;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes ripple-anim {
    to { transform: scale(4); opacity: 0; }
  }

  /* Click hint */
  .click-hint {
    position: absolute;
    bottom: 36px;
    font-size: 0.62rem;
    color: rgba(255,255,255,0.7);
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: hint-pulse 2s infinite;
  }

  @keyframes hint-pulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 0.3; }
  }

  /* Zoom bottom controls */
  .zoom-controls {
    background: #12244a;
    padding: 10px 8px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    flex-shrink: 0;
    border-top: 1px solid rgba(26,115,232,0.2);
  }

  .ctrl-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 0.45rem;
    color: rgba(255,255,255,0.6);
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .ctrl-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
  }

  .ctrl-icon.red { background: #e53935; }
  .ctrl-icon.gray { background: rgba(255,255,255,0.1); }

  /* iPhone home bar */
  .home-bar {
    height: 20px;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .home-bar::after {
    content: '';
    width: 100px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
  }

  /* Sound badge */
  .sound-badge {
    position: absolute;
    top: -10px;
    right: -10px;
    background: var(--vibrant-yellow);
    color: #1a1a2e;
    font-size: 0.55rem;
    font-weight: 900;
    padding: 3px 7px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(4px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 5;
  }

  .sound-badge.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* CTA Button */
  .cta-wrap {
    position: relative;
    z-index: 1;
    margin-top: 28px;
    text-align: center;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--vibrant-pink) 0%, var(--vibrant-purple) 100%);
    color: white;
    text-decoration: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.05rem;
    padding: 16px 36px;
    border-radius: 50px;
    letter-spacing: 1px;
    box-shadow:
      0 8px 30px rgba(255,79,200,0.45),
      0 0 0 0 rgba(255,79,200,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    animation: glow-pulse 2.5s infinite;
    position: relative;
    overflow: hidden;
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--vibrant-yellow), var(--vibrant-orange));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .cta-btn:hover::before { opacity: 1; }
  .cta-btn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 16px 40px rgba(255,79,200,0.55); }
  .cta-btn:active { transform: scale(0.97); }

  .cta-btn span { position: relative; z-index: 1; }

  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 8px 30px rgba(255,79,200,0.45), 0 0 0 0 rgba(255,79,200,0.4); }
    50% { box-shadow: 0 8px 30px rgba(255,79,200,0.45), 0 0 0 8px rgba(255,79,200,0); }
  }

  .cta-sub {
    margin-top: 10px;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
  }

  /* Floating particles */
  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 1.2rem;
    animation: particle-fly 1.2s ease-out forwards;
    z-index: 999;
  }

  @keyframes particle-fly {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.4) rotate(360deg); }
  }
</style>
</head>
<body>

<h1>PAW<span>ZOOM</span></h1>
<p class="tagline">🐾 tap the cat · hear the meow 🐾</p>

<!-- iPhone Frame -->
<div class="iphone">

  <!-- Zoom top bar -->
  <div class="zoom-bar">
    <div class="zoom-logo">
      <!-- Zoom camera icon SVG -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="6" fill="#1a73e8"/>
        <path d="M4 8.5C4 7.67 4.67 7 5.5 7H14C14.83 7 15.5 7.67 15.5 8.5V15.5C15.5 16.33 14.83 17 14 17H5.5C4.67 17 4 16.33 4 15.5V8.5Z" fill="white"/>
        <path d="M15.5 10.5L19.5 8V16L15.5 13.5V10.5Z" fill="white"/>
      </svg>
      <span class="zoom-logo-text">PawZoom</span>
    </div>
    <div class="zoom-status">
      <div class="status-dot"></div>
      LIVE · 1 CAT
    </div>
  </div>

  <!-- Video screen -->
  <div class="zoom-screen" id="zoomScreen" onclick="handleClick(event)">
    <!-- Mini self-view -->
    <div class="mini-preview">
      <div class="mini-face" id="miniCat">🐱</div>
    </div>

    <!-- Main cat -->
    <div class="cat-emoji" id="mainCat">🐱</div>

    <!-- Sound flash badge -->
    <div class="sound-badge" id="soundBadge">🔊 MEOW!</div>

    <div class="name-tag">Whiskers McFluffins</div>
    <div class="click-hint">👆 tap to meow</div>
  </div>

  <!-- Zoom bottom controls -->
  <div class="zoom-controls">
    <div class="ctrl-btn">
      <div class="ctrl-icon gray">🎙️</div>
      Mute
    </div>
    <div class="ctrl-btn">
      <div class="ctrl-icon gray">📹</div>
      Video
    </div>
    <div class="ctrl-btn">
      <div class="ctrl-icon gray">🐾</div>
      Paws
    </div>
    <div class="ctrl-btn">
      <div class="ctrl-icon gray">💬</div>
      Chat
    </div>
    <div class="ctrl-btn">
      <div class="ctrl-icon red">📵</div>
      Leave
    </div>
  </div>

  <div class="home-bar"></div>
</div>

<!-- CTA Button -->
<div class="cta-wrap">
  <a href="https://easypagex.github.io/pawz/" target="_blank" class="cta-btn">
    <span>🐾</span>
    <span>Visit PawVibesZ</span>
    <span>✨</span>
  </a>
  <div class="cta-sub">easypagex.github.io/pawz</div>
</div>

<script>
  const cats = [
    '🐱','😸','😹','😺','😻','😼','😽','🙀','😿','😾',
    '🐯','🦁','🐈','🐈‍⬛','🐾','🦊','🐺','🐻','🐼','🐨',
    '🐵','🐸','🐧','🦄','🐙','🦋','🦖','🦕','🐲','🦝'
  ];

  const names = [
    'Whiskers McFluffins','Captain Mittens','Lord Purrington',
    'Princess Biscuit','Sir Floppington','Duchess Meowsworth',
    'Baron Von Fuzzbutt','Lady Scratchy','Professor Pawsworth'
  ];

  // Cat sounds using Web Audio API
  function playMeow() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      const makeSound = (type, freq, start, dur, gain) => {
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
        osc.frequency.exponentialRampToValueAtTime(freq * 1.8, ctx.currentTime + start + dur * 0.3);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.6, ctx.currentTime + start + dur);
        gainNode.gain.setValueAtTime(0, ctx.currentTime + start);
        gainNode.gain.linearRampToValueAtTime(gain, ctx.currentTime + start + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
        osc.start(ctx.currentTime + start);
        osc.stop(ctx.currentTime + start + dur + 0.05);
      };

      // Randomize meow style
      const meows = [
        () => { makeSound('sine', 400 + Math.random()*200, 0, 0.5, 0.3); makeSound('triangle', 350, 0.05, 0.4, 0.15); },
        () => { makeSound('sine', 600, 0, 0.3, 0.25); makeSound('sine', 800, 0.25, 0.4, 0.2); },
        () => { makeSound('sawtooth', 300, 0, 0.6, 0.15); makeSound('sine', 450, 0, 0.5, 0.2); },
        () => { makeSound('sine', 700, 0, 0.2, 0.2); makeSound('sine', 500, 0.15, 0.5, 0.25); makeSound('sine', 650, 0.5, 0.25, 0.15); },
      ];

      meows[Math.floor(Math.random() * meows.length)]();
    } catch(e) { /* audio blocked */ }
  }

  let lastCat = '🐱';
  let soundBadgeTimer;

  function getRandomCat() {
    let c;
    do { c = cats[Math.floor(Math.random() * cats.length)]; } while (c === lastCat);
    lastCat = c;
    return c;
  }

  function getRandomName() {
    return names[Math.floor(Math.random() * names.length)];
  }

  function handleClick(e) {
    const screen = document.getElementById('zoomScreen');
    const mainCat = document.getElementById('mainCat');
    const miniCat = document.getElementById('miniCat');
    const nameTag = document.querySelector('.name-tag');
    const badge = document.getElementById('soundBadge');

    // New cat
    const newCat = getRandomCat();
    mainCat.classList.remove('pop');
    void mainCat.offsetWidth; // reflow
    mainCat.textContent = newCat;
    mainCat.classList.add('pop');
    mainCat.addEventListener('animationend', () => mainCat.classList.remove('pop'), { once: true });

    // Mini preview also changes
    miniCat.textContent = cats[Math.floor(Math.random() * cats.length)];

    // Update name
    nameTag.textContent = getRandomName();

    // Play sound
    playMeow();

    // Show badge
    clearTimeout(soundBadgeTimer);
    badge.classList.add('show');
    soundBadgeTimer = setTimeout(() => badge.classList.remove('show'), 900);

    // Ripple
    const rect = screen.getBoundingClientRect();
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    const size = 100;
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
    screen.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());

    // Particles
    spawnParticles(e.clientX, e.clientY);
  }

  function spawnParticles(x, y) {
    const emojis = ['⭐','✨','💫','🌟','💥','🐾','❤️','🎉'];
    const count = 4 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'particle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
        el.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }, i * 60);
    }
  }
</script>
</body>
</html>
